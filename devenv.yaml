# Mirrors the main flake's nixpkgs pin so a single `nix flake update && devenv update`
# keeps the dev environment and the system configurations in lockstep.
inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
